<div class="section-title">
  Doctors Near You

  <div class="filters-bar">

    <!-- Speciality Dropdown -->
    <div class="filter-item">
      <select (change)="onSpecialityChange($event)">
        <option value="">All Specialities</option>
        <option *ngFor="let spec of specializations" [value]="spec">
          {{ spec }}
        </option>
      </select>
    </div>

    <!-- Rating Filter -->
    <div class="filter-item">
      <select (change)="onRatingChange($event)">
        <option value="">Any Rating</option>
        <option value="4">4★ & above</option>
        <option value="3">3★ & above</option>
      </select>
    </div>

    <!-- Distance Filter -->
    <div class="filter-item">
      <select (change)="onDistanceChange($event)">
        <option value="">Any Distance</option>
        <option value="2">Within 2 km</option>
        <option value="5">Within 5 km</option>
        <option value="10">Within 10 km</option>
      </select>
    </div>

    <!-- Sort -->
    <div class="filter-item">
      <select (change)="sortDoctors($event)">
        <option value="">Sort By</option>
        <option value="distance">Distance</option>
        <option value="rating">Rating</option>
        <option value="experience">Experience</option>
      </select>
    </div>

  </div>
</div>

<div *ngIf="loading" class="text-center p-5">
  <div class="spinner-border text-primary"></div>
  <p class="mt-2">Loading doctors...</p>
</div>

<div class="card-container" *ngIf="!loading">

  <div class="alert alert-info m-4" *ngIf="doctors.length === 0">
    No doctors found. Try adjusting your filters.
  </div>

  <div class="doctor-card" *ngFor="let doc of doctors">

    <div class="image-wrapper">
      <img [src]="doc.image" [alt]="doc.name">
      <span class="rating">{{ doc.rating }} ★</span>
    </div>

    <div class="card-body">
      <h3>{{ doc.name }}</h3>
      <p class="specialization">{{ doc.specialization }}</p>
      <p>{{ doc.experience }}</p>
      <p class="hospital">{{ doc.hospital }}</p>
      <p class="location">📍 {{ doc.location }}</p>

      <div class="bottom-info">
        <span>{{ doc.distance }}</span>
        <button class="book-btn" (click)="bookAppointment(doc.doctor_id)">
          Book Appointment
        </button>
      </div>
    </div>

  </div>

</div>
