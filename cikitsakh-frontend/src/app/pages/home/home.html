<div class="container mt-6 text-center">

  <h2 class="mb-5 fw-bold">Choose Healthcare Type</h2>

  <div class="row justify-content-center g-4">

    <!-- Human Card -->
    <div class="col-md-4">
      <div class="care-card card shadow-lg p-4" (click)="selectCare('human')">
        <div class="display-3 mb-3">👨‍⚕️</div>
        <h4>Human Doctor</h4>
        <p class="text-muted">Consult medical specialists</p>
      </div>
    </div>

    <!-- Pet Card -->
    <div class="col-md-4">
      <div class="care-card card shadow-lg p-4" (click)="selectCare('pet')">
        <div class="display-3 mb-3">🐶</div>
        <h4>Pet Doctor</h4>
        <p class="text-muted">Veterinary care services</p>
      </div>
    </div>

  </div>

  <app-marquee></app-marquee>
  <!-- <nearby-doctors></nearby-doctors> -->

</div>
